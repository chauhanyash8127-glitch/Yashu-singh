<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit's Private Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            overflow: hidden;
        }

        /* 1. SPLASH SCREEN (शुरुआती लोगो स्क्रीन) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle, #1a2a6c, #27213c, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        /* स्मार्ट 'A' लोगो डिज़ाइन */
        .smart-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d2ff, #00c6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            font-weight: bold;
            color: #121212;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            animation: pulse 2s infinite ease-in-out;
            border: 4px solid #fff;
        }
        
        .loader-text {
            font-size: 22px;
            margin-top: 25px;
            letter-spacing: 3px;
            color: #00d2ff;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 210, 255, 0.6); }
            50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(0, 210, 255, 0.9); }
        }

        /* 2. MAIN APP DASHBOARD (मुख्य ऐप) */
        #main-app {
            display: none;
            padding: 20px;
            text-align: center;
        }
        .app-header {
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #00d2ff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .app-btn {
            width: 85%;
            max-width: 300px;
            background-color: #2a2a2a;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .app-btn:hover {
            background-color: #00d2ff;
            color: black;
            transform: scale(1.05);
        } .intro-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: #0b0f19;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeOutBg 0.6s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
}
.logo-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
}
.brand-letter {
  font-family: 'Montserrat', 'Helvetica Neue', sans-serif;
  font-size: 7rem;
  font-weight: 900;
  color: #ffffff;
  opacity: 0;
  transform: scale(0.4) translateY(20px);
  filter: blur(5px);
  animation: cinematicReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}
@keyframes cinematicReveal {
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
  }
}
@keyframes fadeOutBg {
  to {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
}

        
        /* नीचे के नॉर्मल अक्षर */
        .bottom-initials {
            margin-top: 40px;
            font-size: 24px;
            letter-spacing: 15px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="intro-container">
  <div class="logo-wrapper">
    <span class="brand-letter">A</span>
  </div>
</div>

    
    
        


    <div id="main-app">
        <div class="app-header">My Private Hub 🚀</div>
        
        <div class="card-container">
            <a href="https://instagram.com" target="_blank" class="app-btn">Open Instagram</a>
            <a href="https://google.com" target="_blank" class="app-btn">Google Search</a>
            
            <div class="bottom-initials">A & K</div>
        </div>
    </div>

    <script>
        setTimeout(function() {
            var splash = document.getElementById('splash-screen');
            var app = document.getElementById('main-app');
            splash.style.opacity = 0;
            setTimeout(function() {
                splash.style.display = 'none';
                app.style.display = 'block';
                document.body.style.overflow = 'auto';
            }, 500);
        }, 3000);
    </script>

</body>
</html>
