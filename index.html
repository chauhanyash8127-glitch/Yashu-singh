<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit's Private Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            overflow: hidden;
        }

        /* 1. SPLASH SCREEN (शुरुआती लोगो स्क्रीन) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle, #1a2a6c, #27213c, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        /* स्मार्ट 'A' लोगो डिज़ाइन */
        ./* सर्वम AI जैसा नियॉन ग्लोइंग स्पिनर लोगो */
.smart-logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid rgba(0, 210, 255, 0.1);
  border-top: 4px solid #00d2ff;
  border-right: 4px solid #00ffaa;
  box-shadow: 0 0 30px rgba(0, 210, 255, 0.5), inset 0 0 15px rgba(0, 255, 170, 0.3);
  animation: sarvamSpin 1.5s linear infinite;
}

.loader-text {
  font-size: 20px;
  margin-top: 25px;
  letter-spacing: 4px;
  color: #00d2ff;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0, 210, 255, 0.6);
  animation: pulseText 1.5s ease-in-out infinite;
}

@keyframes sarvamSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes pulseText {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}


        /* 2. MAIN APP DASHBOARD (मुख्य ऐप) */
        #main-app {
            display: none;
            padding: 20px;
            text-align: center;
        }
        .app-header {
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #00d2ff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .app-btn {
            width: 85%;
            max-width: 300px;
            background-color: #2a2a2a;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .app-btn:hover {
            background-color: #00d2ff;
            color: black;
            transform: scale(1.05);
        } .intro-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: #0b0f19;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeOutBg 0.6s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
}
.logo-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
}
..smart-logo {
  display: inline-block;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid rgba(0, 210, 255, 0.1);
  border-top: 4px solid #00d2ff;
  border-right: 4px solid #00ffaa;
  box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
  animation: sarvamSpin 1.5s linear infinite;
}

@keyframes cinematicReveal {
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
  }
}
@keyframes fadeOutBg {
  to {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
}

        
        /* नीचे के नॉर्मल अक्षर */
        .bottom-initials {
            margin-top: 40px;
            font-size: 24px;
            letter-spacing: 15px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="intro-container">
  <div class="logo-wrapper">
<div class="smart-logo"></div>


  </div>
</div>

    
    
        


    <div id="main-app">
        <div class="app-header">My Private Hub 🚀</div>
        
        
    
    <div style="background-color: #1a1a1a; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid #00d2ff;">
  <input type="text" id="address-bar" placeholder="Enter website name (e.g., google.com)..." style="flex: 1; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 5px;" />
  <button id="load-btn" style="background: #00d2ff; color: #000; padding: 10px 20px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer;">Go</button>
</div>

<div style="width: 100%; height: 75vh; background: #111;">
  <iframe id="web-viewer" src="about:blank" style="width: 100%; height: 100%; border: none;"></iframe>
</div>
 
<div class="bottom-initials">A & K</div>
</div>

<div style="position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10000;">
  
  <div id="ai-logo-btn" style="width: 55px; height: 55px; background: linear-gradient(135deg, #00d2ff, #00ffaa); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 15px rgba(0, 210, 255, 0.6); transition: transform 0.2s;">
    <span style="font-size: 24px; color: #000;">🤖</span>
  </div>

  <div id="clear-data-btn" style="width: 55px; height: 55px; background: #ff3333; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 15px rgba(255, 51, 51, 0.6); transition: transform 0.2s;">
    <span style="font-size: 24px; color: #fff;">🧹</span>
  </div>
</div>

<div id="ai-chat-box" style="display: none; position: fixed; bottom: 100px; right: 20px; width: 300px; height: 400px; background: #1a1a1a; border: 2px solid #00d2ff; border-radius: 10px; z-index: 10000; flex-direction: column; box-shadow: 0 0 20px rgba(0,210,255,0.3);">
  <div style="background: #00d2ff; color: #000; padding: 10px; font-weight: bold; border-radius: 8px 8px 0 0;">My Private AI Assistant</div>
  <div style="flex: 1; padding: 10px; overflow-y: auto; color: #ccc; font-size: 14px;">नमस्ते! मैं आपका पर्सनल AI हूँ। (अभी मैं फ्रंटएंड मोड में हूँ)</div>
</div>

<script>
  // पुराना एनीमेशन टाइमआउट लॉजिक
  setTimeout(function() {
    var splash = document.querySelector('.intro-container');
    var app = document.getElementById('main-app');
    if(splash) splash.style.opacity = '0';
    setTimeout(function() {
      if(splash) splash.style.display = 'none';
      if(app) app.style.display = 'block';
      document.body.style.overflow = 'auto';
    }, 500);
  }, 3000);

  // ब्राउज़र और एड्रेस बार का मुख्य लॉजिक
  const addressBar = document.getElementById('address-bar');
  const loadBtn = document.getElementById('load-btn');
  const webViewer = document.getElementById('web-viewer');

  function loadWebsite() {
    let url = addressBar.value.trim().replace(/\s+/g, '');
    if (url === "") return;

    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    webViewer.src = url;
  }

  loadBtn.addEventListener('click', loadWebsite);

  addressBar.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      loadWebsite();
    }
  });

  // नए बटन्स (AI और झाड़ू) का लॉजिक
  const aiLogoBtn = document.getElementById('ai-logo-btn');
  const clearDataBtn = document.getElementById('clear-data-btn');
  const aiChatBox = document.getElementById('ai-chat-box');

  aiLogoBtn.addEventListener('click', () => {
    if (aiChatBox.style.display === 'none' || aiChatBox.style.display === '') {
      aiChatBox.style.display = 'flex';
    } else {
      aiChatBox.style.display = 'none';
    }
  });

  clearDataBtn.addEventListener('click', () => {
    const confirmClear = confirm("क्या आप टॉर ब्राउज़र की तरह सब कुछ साफ करके नई शुरुआत करना चाहते हैं?");
    if (confirmClear) {
      addressBar.value = "";
      webViewer.src = "about:blank";
      aiChatBox.style.display = 'none';
      alert("सब कुछ पूरी तरह साफ कर दिया गया है! नई पहचान तैयार है।");
    }
  });
</script>

</body>
</html>
