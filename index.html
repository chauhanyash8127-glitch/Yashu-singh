<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Private Hub</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0b;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    
    /* 1. शुरुआत का शानदार चक्र (Loading Spinner) */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0b0b0b;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .smart-logo {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(0, 210, 255, 0.1);
      border-top: 4px solid #00d2ff;
      border-right: 4px solid #00ffaa;
      box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
      animation: spin 1.5s linear infinite;
    }
    .loader-text {
      font-size: 18px; margin-top: 25px; letter-spacing: 4px;
      color: #00d2ff; font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Main App Layout */
    #main-app {
      display: none; /* शुरुआत में छुपा रहेगा, चक्र के बाद खुलेगा */
      height: 100vh;
      flex-direction: column;
    }

    /* 2. हूबहू गूगल जैसा प्रीमियम सर्च कंटेनर */
    .search-container {
      background-color: #0b0b0b;
      padding: 15px 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* गूगल स्टाइल का गोल सर्च बार */
    .google-search-bar {
      display: flex;
      align-items: center;
      background-color: #1f2125;
      width: 100%;
      max-width: 600px;
      height: 52px;
      border-radius: 26px; /* एकदम गोल किनारे */
      padding: 0 16px;
      position: relative;
    }

    /* सर्च बार के अंदर का इनपुट बॉक्स */
    #address-bar {
      flex: 1;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      padding-left: 10px;
      padding-right: 10px;
    }
    #address-bar::placeholder {
      color: #9aa0a6;
    }

    /* सर्च बार के अंदर के आइकन्स */
    .search-icon-left {
      color: #9aa0a6;
      font-size: 18px;
      display: flex;
      align-items: center;
    }
    .icons-right-group {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #9aa0a6;
      font-size: 20px;
      cursor: pointer;
    }

    /* वेबसाइट देखने वाला मुख्य फ़्रेम एरिया */
    .viewer-container {
      flex: 1;
      background-color: #111;
      width: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #111;
    }

    /* 4. तैरते हुए एक्शन बटन्स (AI और झाड़ू) */
    .floating-btn-group {
      position: fixed;
      bottom: 30px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10000;
    }
    .circle-btn {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    #ai-logo-btn { background: linear-gradient(135deg, #00d2ff, #00ffaa); }
    #clear-data-btn { background-color: #ff3333; }

    /* 5. पर्सनल एआई चैट बॉक्स */
    #ai-chat-box {
      display: none;
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: #1a1a1a;
      border: 2px solid #00d2ff;
      border-radius: 8px;
      flex-direction: column;
      z-index: 10000;
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="smart-logo"></div>
    <div class="loader-text">LOADING ASSISTANT...</div>
  </div>

  <div id="main-app">
    <div class="search-container">
      <div class="google-search-bar">
        <span class="search-icon-left">🔍</span>
        
        <input type="text" id="address-bar" placeholder="Search or type URL (e.g., wikipedia.org)">
        
        <div class="icons-right-group">
          <span title="Voice Search">🎙️</span>
          <span title="Google Lens" id="go-trigger-btn">📷</span>
        </div>
      </div>
    </div>

    <div class="viewer-container">
      <iframe id="web-viewer" src="about:blank"></iframe>
    </div>
  </div>

  <div class="floating-btn-group">
    <button id="ai-logo-btn" class="circle-btn">🤖</button>
    <button id="clear-data-btn" class="circle-btn">🧹</button>
  </div>

  <div id="ai-chat-box">
    <div style="background:#00d2ff; color:#000; padding:10px; font-weight:bold;">My Private AI</div>
    <div style="flex:1; padding:10px; overflow-y:auto; color:#ccc; font-size:14px;">नमस्ते! मैं आपका पर्सनल AI हूँ।</div>
  </div>

  <script>
    // लोडिंग चक्र को 2.5 सेकंड तक चलाकर मेन ऐप दिखाने का लॉजिक
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        var app = document.getElementById('main-app');
        if(splash) {
          splash.style.opacity = '0';
          splash.style.pointerEvents = 'none';
        }
        setTimeout(function() {
          if(splash) splash.style.display = 'none';
          if(app) app.style.display = 'flex';
        }, 500);
      }, 2500); // 2.5 सेकंड घूमेगा
    });

    const addressBar = document.getElementById('address-bar');
    const webViewer = document.getElementById('web-viewer');
    const goTriggerBtn = document.getElementById('go-trigger-btn');
    const aiLogoBtn = document.getElementById('ai-logo-btn');
    const aiChatBox = document.getElementById('ai-chat-box');
    const clearDataBtn = document.getElementById('clear-data-btn');

    // वेबसाइट लोड करने का कोर लॉजिक
    function loadWebsite() {
      let url = addressBar.value.trim().replace(/\s+/g, '');
      if (url === "") return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      webViewer.src = url;
    }

    // कीबोर्ड के 'Enter' बटन से सर्च
    addressBar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadWebsite();
    });

    // कैमरा (📷) आइकन पर क्लिक करके सर्च
    goTriggerBtn.addEventListener('click', loadWebsite);

    // एआई चैट बॉक्स चालू/बंद
    aiLogoBtn.addEventListener('click', () => {
      if (aiChatBox.style.display === 'none' || aiChatBox.style.display === '') {
        aiChatBox.style.display = 'flex';
      } else {
        aiChatBox.style.display = 'none';
      }
    });

    // झाड़ू बटन लॉजिक
    clearDataBtn.addEventListener('click', () => {
      if (confirm("क्या आप ब्राउज़र साफ़ करके नई सुरक्षा परत चाहते हैं?")) {
        addressBar.value = "";
        webViewer.src = "about:blank";
        aiChatBox.style.display = 'none';
        alert("सब कुछ साफ़ कर दिया गया है!");
      }
    });
  </script>
</body>
</html>
